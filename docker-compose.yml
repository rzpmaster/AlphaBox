services:
  # Deployment-facing values to confirm in the root .env:
  # PUBLIC_ORIGIN=https://your-domain.example
  # NEXT_PUBLIC_API_URL=/api/v1
  # INTERNAL_API_URL=http://backend:8000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alphabox}
      POSTGRES_USER: ${POSTGRES_USER:-alphabox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphabox}
    # Expose only if you need host-side database access, for example external backups or debugging.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Expose only if you need host-side Redis access for debugging or external tooling.
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    env_file: ./backend/.env.example
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-${PUBLIC_ORIGIN:-http://localhost:3000},http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-alphabox}:${POSTGRES_PASSWORD:-alphabox}@postgres:5432/${POSTGRES_DB:-alphabox}
      REDIS_URL: redis://redis:6379/0
      CREATE_INITIAL_ADMIN: ${CREATE_INITIAL_ADMIN:-true}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@alphabox.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-AlphaBox Admin}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_TIME_ZONE: ${NEXT_PUBLIC_TIME_ZONE:-UTC+8}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
    env_file: ./frontend/.env.example
    environment:
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
      NEXT_PUBLIC_TIME_ZONE: ${NEXT_PUBLIC_TIME_ZONE:-UTC+8}
    command: npm run start -- --hostname 0.0.0.0 --port 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
